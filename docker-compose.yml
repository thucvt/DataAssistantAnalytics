services:
  backend:
    build:
      context: ./backend
    container_name: daa_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ENV_FILE: /app/data/.env
      APP_PORT: "8080"

      # ── Facebook / Meta Ads ─────────────────────────────────────────────
      # Tạo app tại https://developers.facebook.com → My Apps → Create App
      FACEBOOK_APP_ID: ""
      FACEBOOK_APP_SECRET: ""
      FACEBOOK_REDIRECT_URI: "http://localhost:8080/api/oauth/facebook/callback"
      FACEBOOK_AD_ACCOUNT_ID: ""        # act_xxxxxxxxx

      # ── Shopee Open Platform ────────────────────────────────────────────
      # Đăng ký tại https://open.shopee.com/
      SHOPEE_PARTNER_ID: ""
      SHOPEE_PARTNER_KEY: ""
      SHOPEE_REDIRECT_URI: "http://localhost:8080/api/oauth/shopee/callback"

      # ── TikTok Business API ─────────────────────────────────────────────
      # Đăng ký tại https://business-api.tiktok.com/
      TIKTOK_APP_ID: ""
      TIKTOK_APP_SECRET: ""
      TIKTOK_REDIRECT_URI: "http://localhost:8080/api/oauth/tiktok/callback"
      TIKTOK_ADVERTISER_ID: ""          # (tuỳ chọn, lấy sau khi OAuth)

      # ── Google Ads Manager ──────────────────────────────────────────────
      # Tạo OAuth credentials tại https://console.cloud.google.com/
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      GOOGLE_REDIRECT_URI: "http://localhost:8080/api/oauth/google/callback"
      GOOGLE_ADS_CUSTOMER_ID: ""        # Google Ads Customer ID (không dấu gạch)
      GOOGLE_ADS_DEVELOPER_TOKEN: ""    # Từ Google Ads Manager Account
      GOOGLE_ADS_LOGIN_CUSTOMER_ID: ""  # MCC account ID (nếu có)
    volumes:
      - backend_data:/app/data
      # Lưu file export Excel tạm thời (Phase 4)
      - export_tmp:/tmp/exports
    networks:
      - daa_net

  frontend:
    build:
      context: ./frontend
    container_name: daa_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      # Trỏ frontend tới backend API
      VITE_API_BASE: http://localhost:8080
    depends_on:
      - backend
    networks:
      - daa_net

  # PostgreSQL đóng gói sẵn — chỉ chạy khi bật profile `with-postgres`.
  # Khách không có DB riêng có thể dùng cái này thay cho SQLite fallback.
  postgres:
    image: postgres:16-alpine
    container_name: daa_postgres
    restart: unless-stopped
    profiles: ["with-postgres"]
    environment:
      POSTGRES_USER: daa
      POSTGRES_PASSWORD: daa_change_me
      POSTGRES_DB: daa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - daa_net

volumes:
  backend_data:
  export_tmp:
  postgres_data:

networks:
  daa_net:
    driver: bridge
